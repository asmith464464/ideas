{% assign post = include.post %}
{% assign tags_str = post.tags | join: ' ' %}
<div class="idea-card" data-tags="{{ tags_str }}">
  <a class="idea-title" href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
  <div class="idea-meta">
    {{ post.idea_id }}
    &nbsp;·&nbsp;
    {{ post.date_range_start }} — {{ post.date_range_end }}
    &nbsp;·&nbsp;
    <span class="badge badge-{{ post.status }}">{{ post.status }}</span>
  </div>
  <div style="margin-top: 0.4rem;">
    {% for tag in post.tags %}
      <span class="tag">{{ tag }}</span>
    {% endfor %}
  </div>
</div>
